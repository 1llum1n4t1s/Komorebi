<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- === GRADIENTS === -->
    <!-- Sky (looking up: bright center → dark green edges) -->
    <radialGradient id="sky" cx="0.5" cy="0.42" r="0.52">
      <stop offset="0%" stop-color="#fffef5"/>
      <stop offset="20%" stop-color="#f9fbe7"/>
      <stop offset="45%" stop-color="#c5e1a5"/>
      <stop offset="70%" stop-color="#66bb6a"/>
      <stop offset="90%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </radialGradient>

    <!-- Sun glow -->
    <radialGradient id="sun" cx="0.5" cy="0.4" r="0.28">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="35%" stop-color="#fff9c4" stop-opacity="0.85"/>
      <stop offset="65%" stop-color="#fff176" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#dcedc8" stop-opacity="0"/>
    </radialGradient>

    <!-- Warm halo -->
    <radialGradient id="halo" cx="0.5" cy="0.42" r="0.45">
      <stop offset="0%" stop-color="#ffecb3" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#ffe082" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#aed581" stop-opacity="0"/>
    </radialGradient>

    <!-- God ray -->
    <linearGradient id="ray" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45"/>
      <stop offset="20%" stop-color="#fff9c4" stop-opacity="0.35"/>
      <stop offset="55%" stop-color="#e8f5e9" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#c8e6c9" stop-opacity="0"/>
    </linearGradient>

    <!-- Bark -->
    <linearGradient id="bark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4e342e"/>
      <stop offset="50%" stop-color="#3e2723"/>
      <stop offset="100%" stop-color="#2a1b12"/>
    </linearGradient>

    <!-- Canopy greens (layers: back / mid / front) -->
    <linearGradient id="cBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="cMid" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#43a047"/>
      <stop offset="50%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="cFront" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#4caf50"/>
      <stop offset="50%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>

    <!-- Bokeh -->
    <radialGradient id="bk">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#fffde7" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#fff9c4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bkg">
      <stop offset="0%" stop-color="#e8f5e9" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#a5d6a7" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#66bb6a" stop-opacity="0"/>
    </radialGradient>

    <!-- Rim -->
    <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>

    <!-- === FILTERS === -->
    <!-- Canopy noise: creates organic holes in foliage -->
    <filter id="canopyTex" x="-10%" y="-10%" width="120%" height="120%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.035 0.04"
                    numOctaves="6" seed="42" result="n"/>
      <feColorMatrix in="n" type="luminanceToAlpha" result="na"/>
      <feComponentTransfer in="na" result="mask">
        <feFuncA type="table" tableValues="0 0 0.15 0.55 0.88 1 1 1 1 0.88 0.55 0.15"/>
      </feComponentTransfer>
      <feGaussianBlur in="mask" stdDeviation="0.8" result="sm"/>
      <feComposite in="SourceGraphic" in2="sm" operator="in"/>
    </filter>

    <!-- Finer canopy noise (for front layer) -->
    <filter id="canopyFine" x="-10%" y="-10%" width="120%" height="120%"
            color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.045 0.055"
                    numOctaves="5" seed="13" result="n"/>
      <feColorMatrix in="n" type="luminanceToAlpha" result="na"/>
      <feComponentTransfer in="na" result="mask">
        <feFuncA type="table" tableValues="0 0 0.1 0.4 0.8 1 1 1 1 0.9 0.6 0.2"/>
      </feComponentTransfer>
      <feGaussianBlur in="mask" stdDeviation="0.5" result="sm"/>
      <feComposite in="SourceGraphic" in2="sm" operator="in"/>
    </filter>

    <!-- Bark surface texture -->
    <filter id="barkTex" x="-3%" y="-3%" width="106%" height="106%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06 0.25"
                    numOctaves="4" seed="99" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="2.5"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Leaf edge displacement (organic, not smooth) -->
    <filter id="leafEdge" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.06"
                    numOctaves="4" seed="77" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="10"
                         xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- Depth blur levels -->
    <filter id="bgBlur"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="midBlur"><feGaussianBlur stdDeviation="2"/></filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="rayGlow" x="-8%" y="-5%" width="116%" height="110%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <filter id="softFocus"><feGaussianBlur stdDeviation="1.2"/></filter>

    <!-- Drop shadow for depth -->
    <filter id="dropSh" x="-8%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>

    <!-- Branch shadow -->
    <filter id="branchSh" x="-10%" y="-10%" width="125%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="bl"/>
      <feOffset in="bl" dx="2" dy="5" result="off"/>
      <feFlood flood-color="#0a1f10" flood-opacity="0.55" result="clr"/>
      <feComposite in="clr" in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="clip">
      <rect x="16" y="16" width="480" height="480" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <!-- Base with shadow -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96"
        fill="#1b5e20" filter="url(#dropSh)"/>

  <g clip-path="url(#clip)">
    <!-- =============================== -->
    <!-- LAYER 0: SKY                    -->
    <!-- =============================== -->
    <rect x="16" y="16" width="480" height="480" fill="url(#sky)"/>
    <ellipse cx="256" cy="215" rx="160" ry="140" fill="url(#sun)"/>
    <ellipse cx="256" cy="230" rx="230" ry="200" fill="url(#halo)" filter="url(#glow)"/>

    <!-- =============================== -->
    <!-- LAYER 1: GOD RAYS               -->
    <!-- =============================== -->
    <g opacity="0.6">
      <polygon points="236,115 278,115 315,496 200,496"
               fill="url(#ray)" filter="url(#rayGlow)"/>
      <polygon points="145,95 178,90 230,496 85,496"
               fill="url(#ray)" opacity="0.7" filter="url(#rayGlow)"/>
      <polygon points="340,95 372,90 435,496 280,496"
               fill="url(#ray)" opacity="0.65" filter="url(#rayGlow)"/>
      <polygon points="72,135 100,125 165,496 16,496"
               fill="url(#ray)" opacity="0.4" filter="url(#rayGlow)"/>
      <polygon points="415,138 442,128 496,496 350,496"
               fill="url(#ray)" opacity="0.38" filter="url(#rayGlow)"/>
    </g>

    <!-- =============================== -->
    <!-- LAYER 2: BACK CANOPY (blurred)  -->
    <!-- =============================== -->
    <g filter="url(#bgBlur)" opacity="0.55">
      <g filter="url(#canopyTex)">
        <!-- Dense canopy ring around edges -->
        <path d="M16,16 L496,16 L496,190
                 Q440,145 370,132 Q300,120 256,150
                 Q210,120 140,132 Q70,145 16,190 Z"
              fill="url(#cBack)"/>
        <!-- Left side -->
        <path d="M16,230 Q55,290 40,360 Q25,420 16,496
                 L100,496 Q85,400 95,340 Q70,270 16,230 Z"
              fill="url(#cBack)"/>
        <!-- Right side -->
        <path d="M496,230 Q455,290 470,360 Q485,420 496,496
                 L410,496 Q425,400 415,340 Q440,270 496,230 Z"
              fill="url(#cBack)"/>
      </g>
    </g>

    <!-- =============================== -->
    <!-- LAYER 3: TREE TRUNKS & BRANCHES -->
    <!-- =============================== -->
    <g filter="url(#branchSh)">
      <g filter="url(#barkTex)">
        <!-- Left trunk (thick) -->
        <path d="M50,496 L100,496
                 Q105,435 102,375 Q98,320 105,275
                 Q112,240 125,210 Q138,185 152,168
                 L140,160
                 Q125,178 110,205 Q95,238 86,275
                 Q72,330 65,385 Q55,440 50,496 Z"
              fill="url(#bark)"/>

        <!-- Right trunk (thick) -->
        <path d="M410,496 L462,496
                 Q458,440 452,385 Q445,330 430,275
                 Q420,238 405,205 Q392,178 378,160
                 L368,168
                 Q380,185 392,210 Q405,240 412,275
                 Q418,320 416,375 Q412,435 410,496 Z"
              fill="url(#bark)"/>

        <!-- Left main branch up-right -->
        <path d="M152,168 Q172,138 198,118 Q225,102 250,98 Q258,97 264,100
                 L260,108 Q252,106 244,107 Q222,112 198,128
                 Q175,145 158,170 Z"
              fill="url(#bark)"/>

        <!-- Right main branch up-left -->
        <path d="M368,168 Q348,138 320,118 Q295,102 268,98 Q260,97 256,100
                 L258,108 Q265,106 275,107 Q296,112 318,128
                 Q342,145 360,170 Z"
              fill="url(#bark)"/>

        <!-- Left secondary branch outward -->
        <path d="M105,275 Q75,252 50,242 Q30,236 16,234
                 L16,244 Q32,246 52,254 Q76,264 103,284 Z"
              fill="url(#bark)"/>

        <!-- Right secondary branch outward -->
        <path d="M430,275 Q455,252 478,242 Q492,236 496,234
                 L496,244 Q490,246 475,254 Q452,264 434,284 Z"
              fill="url(#bark)"/>

        <!-- Left small twig -->
        <path d="M125,210 Q100,192 78,184 Q60,178 42,176
                 L42,183 Q60,186 78,194 Q100,204 122,218 Z"
              fill="url(#bark)"/>

        <!-- Right small twig -->
        <path d="M405,210 Q425,192 448,184 Q465,178 480,176
                 L480,183 Q466,186 450,194 Q426,204 408,218 Z"
              fill="url(#bark)"/>

        <!-- Upper left branch to corner -->
        <path d="M152,168 Q132,135 112,112 Q90,92 65,80 Q40,70 16,66
                 L16,74 Q42,78 66,88 Q90,100 112,120
                 Q132,142 150,172 Z"
              fill="url(#bark)"/>

        <!-- Upper right branch to corner -->
        <path d="M368,168 Q388,135 408,112 Q428,92 452,80 Q476,70 496,66
                 L496,74 Q478,78 454,88 Q430,100 408,120
                 Q388,142 370,172 Z"
              fill="url(#bark)"/>

        <!-- Top V-fork (where trunks meet at top) -->
        <path d="M264,100 Q268,85 266,68 Q262,52 254,40 Q246,30 235,24
                 L238,18 Q252,26 262,40 Q272,56 276,72 Q278,88 272,104 Z"
              fill="url(#bark)"/>
        <path d="M256,100 Q252,85 254,68 Q258,52 266,40 Q274,30 285,24
                 L282,18 Q268,26 258,40 Q248,56 246,72 Q244,88 250,104 Z"
              fill="url(#bark)"/>

        <!-- Top twigs to corners -->
        <path d="M235,24 Q210,16 180,16 L16,16 L16,22
                 Q160,20 182,22 Q212,24 237,32 Z"
              fill="url(#bark)" opacity="0.85"/>
        <path d="M285,24 Q310,16 340,16 L496,16 L496,22
                 Q355,20 335,22 Q308,24 283,32 Z"
              fill="url(#bark)" opacity="0.85"/>
      </g>
    </g>

    <!-- =============================== -->
    <!-- LAYER 4: MID CANOPY (light blur)-->
    <!-- =============================== -->
    <g filter="url(#midBlur)" opacity="0.75">
      <g filter="url(#canopyTex)">
        <!-- Top-left dense foliage -->
        <path d="M16,16 L190,16 Q155,48 132,85 Q112,118 118,150
                 Q95,130 65,120 Q35,112 16,110 Z"
              fill="url(#cMid)"/>
        <!-- Top-right dense foliage -->
        <path d="M325,16 L496,16 L496,110 Q480,112 450,120
                 Q420,130 398,150 Q402,118 382,85 Q360,48 325,16 Z"
              fill="url(#cMid)"/>
        <!-- Left edge foliage -->
        <path d="M16,165 Q38,185 48,215 Q56,245 40,275 Q25,295 16,310 Z"
              fill="url(#cMid)"/>
        <!-- Right edge foliage -->
        <path d="M496,165 Q475,185 465,215 Q458,245 472,275 Q488,295 496,310 Z"
              fill="url(#cMid)"/>
      </g>
    </g>

    <!-- =============================== -->
    <!-- LAYER 5: FRONT CANOPY (sharp)   -->
    <!-- =============================== -->
    <g filter="url(#canopyFine)">
      <!-- Top-left sharp cluster -->
      <path d="M16,16 L145,16 Q118,38 100,65 Q85,90 90,115
               Q70,100 45,92 Q25,88 16,86 Z"
            fill="url(#cFront)" filter="url(#leafEdge)"/>
      <!-- Top-right sharp cluster -->
      <path d="M370,16 L496,16 L496,86 Q488,88 468,92
               Q445,100 425,115 Q430,90 415,65 Q398,38 370,16 Z"
            fill="url(#cFront)" filter="url(#leafEdge)"/>
      <!-- Left edge detail -->
      <path d="M16,140 Q30,155 36,178 Q40,200 16,215 Z"
            fill="url(#cFront)" opacity="0.9"/>
      <!-- Right edge detail -->
      <path d="M496,140 Q482,155 476,178 Q472,200 496,215 Z"
            fill="url(#cFront)" opacity="0.9"/>
      <!-- Bottom-left foreground leaves -->
      <path d="M16,420 Q40,405 50,435 Q62,458 40,480 Q25,492 16,496 Z"
            fill="url(#cFront)" opacity="0.65"/>
      <!-- Bottom-right foreground leaves -->
      <path d="M496,420 Q472,405 462,435 Q450,458 472,480 Q488,492 496,496 Z"
            fill="url(#cFront)" opacity="0.65"/>
    </g>

    <!-- =============================== -->
    <!-- LAYER 6: BOKEH & LIGHT          -->
    <!-- =============================== -->
    <!-- Large soft depth-of-field bokeh -->
    <circle cx="218" cy="250" r="20" fill="url(#bk)" opacity="0.65" filter="url(#softFocus)"/>
    <circle cx="300" cy="290" r="16" fill="url(#bk)" opacity="0.55" filter="url(#softFocus)"/>
    <circle cx="185" cy="320" r="13" fill="url(#bk)" opacity="0.45" filter="url(#softFocus)"/>
    <circle cx="330" cy="245" r="11" fill="url(#bk)" opacity="0.5"/>
    <circle cx="260" cy="310" r="17" fill="url(#bkg)" opacity="0.35" filter="url(#softFocus)"/>
    <circle cx="350" cy="360" r="14" fill="url(#bkg)" opacity="0.3" filter="url(#softFocus)"/>
    <circle cx="155" cy="370" r="12" fill="url(#bkg)" opacity="0.25" filter="url(#softFocus)"/>

    <!-- Medium bokeh -->
    <circle cx="175" cy="265" r="8" fill="url(#bk)" opacity="0.6"/>
    <circle cx="345" cy="315" r="7" fill="url(#bk)" opacity="0.5"/>
    <circle cx="250" cy="225" r="6.5" fill="url(#bk)" opacity="0.7"/>
    <circle cx="290" cy="360" r="8" fill="url(#bkg)" opacity="0.32"/>

    <!-- Dappled sunlight particles (scattered sparkles) -->
    <circle cx="238" cy="200" r="2.8" fill="#ffffff" opacity="0.92"/>
    <circle cx="278" cy="255" r="2.2" fill="#ffffff" opacity="0.85"/>
    <circle cx="205" cy="285" r="2" fill="#ffffff" opacity="0.72"/>
    <circle cx="315" cy="275" r="2.4" fill="#ffffff" opacity="0.78"/>
    <circle cx="256" cy="245" r="1.8" fill="#ffffff" opacity="0.82"/>
    <circle cx="188" cy="235" r="2" fill="#ffffff" opacity="0.68"/>
    <circle cx="335" cy="225" r="1.6" fill="#ffffff" opacity="0.62"/>
    <circle cx="225" cy="345" r="2.2" fill="#ffffff" opacity="0.52"/>
    <circle cx="360" cy="345" r="1.6" fill="#ffffff" opacity="0.48"/>
    <circle cx="270" cy="180" r="1.5" fill="#ffffff" opacity="0.7"/>
    <circle cx="230" cy="160" r="1.3" fill="#ffffff" opacity="0.6"/>

    <!-- Ground-level dappled light (large, very diffuse) -->
    <circle cx="195" cy="425" r="28" fill="url(#bk)" opacity="0.22" filter="url(#glow)"/>
    <circle cx="320" cy="445" r="24" fill="url(#bk)" opacity="0.18" filter="url(#glow)"/>
    <circle cx="256" cy="465" r="22" fill="url(#bk)" opacity="0.15" filter="url(#glow)"/>
  </g>

  <!-- 3D rim highlight -->
  <rect x="16" y="16" width="480" height="480" rx="96" ry="96"
        fill="none" stroke="url(#rim)" stroke-width="1.5"/>
</svg>
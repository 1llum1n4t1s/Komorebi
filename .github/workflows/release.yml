name: Release
on:
  push:
    tags:
      - v*
jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
  version:
    name: Prepare version string
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Output version string
        id: version
        run: |
          version=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "version=$version" >> "$GITHUB_OUTPUT"
  package:
    needs: [build, version]
    name: Package
    uses: ./.github/workflows/package.yml
    with:
      version: ${{ needs.version.outputs.version }}
  velopack:
    needs: [build, version]
    name: Velopack
    uses: ./.github/workflows/velopack.yml
    with:
      version: ${{ needs.version.outputs.version }}
  release:
    needs: [package, velopack, version]
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          VERSION: ${{ needs.version.outputs.version }}
        run: gh release create "$TAG" -t "$VERSION" --notes-from-tag
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package.*
          path: packages
          merge-multiple: true
      - name: Download Velopack artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: velopack.*
          path: velopack-packages
          merge-multiple: true
      - name: Upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" packages/*
          gh release upload "$TAG" velopack-packages/*

name: Release
on:
  push:
    branches:
      - 'release/**'
# 通常リリースは R2 単独配信で GitHub Releases を作らないため最小権限化する。
# 旧 GithubSource クライアント救済の "踏み台" は /transfer-cf 移行作業時に
# GitHub Releases へ 1 バージョンだけ別途 publish する (継続配信はしない)。
permissions:
  contents: read
jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
  version:
    name: Prepare version string
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Output version string
        id: version
        run: |
          version=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$version" >> "$GITHUB_OUTPUT"
  package:
    needs: [build, version]
    name: Package
    uses: ./.github/workflows/package.yml
    with:
      version: ${{ needs.version.outputs.version }}
  velopack:
    needs: [build, version]
    name: Velopack
    uses: ./.github/workflows/velopack.yml
    with:
      version: ${{ needs.version.outputs.version }}
  r2-upload:
    needs: [package, velopack, version]
    name: R2 Upload
    runs-on: ubuntu-latest
    # R2 が唯一の配信元 (通常リリースは /vava → R2 単独)。
    # Velopack 自動更新成果物 (nupkg/RELEASES/releases.json/Setup/AppImage/Portable.zip) と
    # standalone パッケージ (deb/rpm/独自zip) の両方を R2 にアップロードする。
    permissions:
      contents: read
    steps:
      - name: Download Velopack artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: velopack.*
          path: packages
          merge-multiple: true
      - name: Download package artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: package.*
          path: packages
          merge-multiple: true
      - name: List artifacts
        run: ls -lh packages/
      - name: Setup Node.js (wrangler 4.x が Node.js >=20 を要求、推奨 22)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install wrangler CLI
        # サプライチェーン保護のためバージョン固定。wrangler 本体を更新したら、この --version も合わせて更新すること。
        run: npm install -g wrangler@4.93.0
      # R2 アップロード仕様:
      # - releases.{channel}.json (manifest) は同 channel の旧版を冪等に上書き
      #   → 新リリース後、クライアントはここから新 nupkg URL を取得する
      # - *.nupkg (full/delta) は put のみで既存ファイルは触らない
      #   → 過去バージョンの nupkg を残すことで delta 連鎖と緊急ロールバックを維持
      # - Setup/AppImage/Portable.zip と deb/rpm/独自zip は固定名/バージョン名で put
      - name: Upload to R2 bucket (komorebi-updates)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          uploaded=0
          for f in packages/*; do
            [ -f "$f" ] || continue
            name=$(basename "$f")
            echo "::group::Upload $name"
            wrangler r2 object put "komorebi-updates/$name" --file="$f" --remote
            echo "::endgroup::"
            uploaded=$((uploaded + 1))
          done
          echo "✅ R2 アップロード完了: $uploaded ファイル"
      - name: Verify delivery (5 channel すべての releases.<channel>.json の HTTP 200 を検証)
        run: |
          set -euo pipefail
          base="https://komorebi.1llum1n4t1.com"
          for channel in win-x64 win-arm64 osx-arm64 linux-x64 linux-arm64; do
            url="${base}/releases.${channel}.json"
            echo "Checking ${url}"
            curl --fail --silent --show-error --max-time 30 \
                 --retry 3 --retry-delay 5 --retry-all-errors \
                 -o /dev/null -w "  HTTP %{http_code} (%{size_download} bytes)\n" \
                 "$url"
          done

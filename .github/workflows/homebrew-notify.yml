name: Notify Homebrew Tap

on:
  release:
    types: [published]

jobs:
  notify-homebrew:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Homebrew tap
        env:
          TAG: ${{ github.event.release.tag_name }}
          HOMEBREW_TAP_REPO_TOKEN: ${{ secrets.HOMEBREW_TAP_REPO_TOKEN }}
        run: |
          echo "📢 Notifying Homebrew tap of new release $TAG..."
          # JSON 構造的生成: 文字列補間だと細工タグ名で JSON インジェクションが成立するため、
          # jq -n --arg で値を properly エスケープする (ubuntu-latest には jq が標準搭載)
          payload=$(jq -n --arg v "$TAG" '{event_type:"new-komorebi-release",client_payload:{version:$v}}')
          curl -X POST \
            -H "Authorization: token $HOMEBREW_TAP_REPO_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/1llum1n4t1s/homebrew-komorebi/dispatches \
            -d "$payload"
          echo "✅ Homebrew tap notified successfully"

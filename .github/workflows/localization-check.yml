name: Localization Check
on:
  push:
    branches: [main]
    paths:
      - 'src/Resources/Locales/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/Resources/Locales/**'
  workflow_dispatch:
  workflow_call:

jobs:
  localization-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '24.x'
          cache: 'pnpm'
          cache-dependency-path: build/scripts/pnpm-lock.yaml

      - name: Install dependencies
        # pnpm install --frozen-lockfile は pnpm-lock.yaml と厳格に一致するバージョンを取得するため、
        # サプライチェーン攻撃（レジストリ上のバージョン差し替え）に強い。
        # path@0.12.7 は node 内蔵モジュールの非推奨 npm 版のため削除（pnpm-lock.yaml にも含まれていない）。
        working-directory: build/scripts
        run: pnpm install --frozen-lockfile

      - name: Run localization check
        run: node build/scripts/localization-check.js

      - name: Commit changes
        if: github.event_name == 'push'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -n "$(git status --porcelain)" ]; then
            git add docs/TRANSLATION.md src/Resources/Locales/*.axaml
            git commit -m 'doc: Update translation status and sort locale files'
            git push
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify no changes (PR only)
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Localization files need updating. Run 'node build/scripts/localization-check.js' locally and commit the changes."
            git diff --stat
            exit 1
          fi

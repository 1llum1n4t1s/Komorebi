name: Localization Check
on:
  push:
    branches: [main]
    paths:
      - 'src/Resources/Locales/**'
  pull_request:
    branches: [main]
    paths:
      - 'src/Resources/Locales/**'
  workflow_dispatch:
  workflow_call:

jobs:
  localization-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Install dependencies
        # npm ci は package-lock.json と厳格に一致するバージョンを取得するため、
        # サプライチェーン攻撃（レジストリ上のバージョン差し替え）に強い。
        # path@0.12.7 は node 内蔵モジュールの非推奨 npm 版のため削除（package-lock.json にも含まれていない）。
        working-directory: build/scripts
        run: npm ci

      - name: Run localization check
        run: node build/scripts/localization-check.js

      - name: Commit changes
        if: github.event_name == 'push'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if [ -n "$(git status --porcelain)" ]; then
            git add docs/TRANSLATION.md src/Resources/Locales/*.axaml
            git commit -m 'doc: Update translation status and sort locale files'
            git push
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify no changes (PR only)
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Localization files need updating. Run 'node build/scripts/localization-check.js' locally and commit the changes."
            git diff --stat
            exit 1
          fi

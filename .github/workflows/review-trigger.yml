name: Trigger AI Reviews
# セキュリティ注意:
# - REVIEW_PAT は PR コメント投稿のみに使用する。最小権限は「public_repo」(public repo の場合) または
#   Fine-grained PAT の「Pull requests: Read and write」のみ。
#   admin:repo / delete_repo / workflow スコープは絶対に付与しないこと。
# - actions/github-script は Dependabot (github-actions エコシステム) 経由で SHA 固定で自動更新される。
on:
  pull_request:
    types: [synchronize]

jobs:
  trigger-reviews:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Request AI reviews
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.REVIEW_PAT }}
          script: |
            const pr = context.payload.pull_request.number;
            const repo = context.repo;

            const commands = [
              '@gemini review',
              '@coderabbitai review',
            ];

            for (const cmd of commands) {
              await github.rest.issues.createComment({
                ...repo,
                issue_number: pr,
                body: cmd,
              });
              // レート制限対策で少し待つ
              await new Promise(r => setTimeout(r, 2000));
            }

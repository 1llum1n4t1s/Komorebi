name: Build
on:
  workflow_call:
jobs:
  build:
    strategy:
      matrix:
        include:
          - name: Windows x64
            os: windows-2022
            runtime: win-x64
          - name: Windows ARM64
            os: windows-2022
            runtime: win-arm64
          - name: macOS (Apple Silicon)
            os: macos-latest
            runtime: osx-arm64
          - name: Linux
            os: ubuntu-latest
            runtime: linux-x64
          - name: Linux (arm64)
            os: ubuntu-latest
            runtime: linux-arm64
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install Linux build dependencies
        if: startsWith(matrix.runtime, 'linux-')
        run: |
          sudo apt-get update
          sudo apt-get install -y clang
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: true
      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          dotnet-version: 10.0.x
      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: ${{ runner.os }}-nuget-
      - name: Configure arm64 cross-compilation
        if: matrix.runtime == 'linux-arm64'
        run: |
          sudo dpkg --add-architecture arm64
          CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME")

          # arm64 パッケージ用の ports リポジトリを追加する
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME} main restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME}-updates main restricted
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ ${CODENAME}-backports main restricted" \
          | sudo tee /etc/apt/sources.list.d/arm64.list

          # 既存ソースを amd64 に制限する（DEB822 形式と従来形式の両方に対応）
          if [ -f /etc/apt/sources.list.d/ubuntu.sources ]; then
            sudo sed -i '/^Types:/a Architectures: amd64' /etc/apt/sources.list.d/ubuntu.sources
          fi
          sudo sed -i -e 's/^deb http/deb [arch=amd64] http/g' /etc/apt/sources.list 2>/dev/null || true
          sudo sed -i -e 's/^deb mirror/deb [arch=amd64] mirror/g' /etc/apt/sources.list 2>/dev/null || true

          sudo apt-get update
          sudo apt-get install -y llvm gcc-aarch64-linux-gnu
      - name: Publish
        run: dotnet publish src/Komorebi.csproj -c Release -o publish -r ${{ matrix.runtime }}
      - name: Rename executable file
        if: startsWith(matrix.runtime, 'linux-')
        run: mv publish/Komorebi publish/komorebi
      - name: Tar artifact
        if: startsWith(matrix.runtime, 'linux-') || startsWith(matrix.runtime, 'osx-')
        run: |
          tar -cvf "komorebi.${{ matrix.runtime }}.tar" -C publish .
          rm -r publish/*
          mv "komorebi.${{ matrix.runtime }}.tar" publish
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: komorebi.${{ matrix.runtime }}
          path: publish/*
          retention-days: 3

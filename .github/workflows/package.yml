name: Package
on:
  workflow_call:
    inputs:
      version:
        description: Komorebi package version
        required: true
        type: string
jobs:
  windows:
    name: Package Windows
    runs-on: windows-2022
    strategy:
      matrix:
        include:
          - runtime: win-x64
            label: windows-x64
          - runtime: win-arm64
            label: windows-arm64
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Download build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: komorebi.${{ matrix.runtime }}
          path: build/Komorebi
      - name: Package
        shell: pwsh
        env:
          VERSION: ${{ inputs.version }}
          LABEL: ${{ matrix.label }}
        run: ./build/scripts/package.win.ps1
      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: package.${{ matrix.label }}
          path: build/komorebi_*.zip
          retention-days: 3
  osx-app:
    name: Package macOS
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - runtime: osx-arm64
            label: macos-apple-silicon
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Download build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: komorebi.${{ matrix.runtime }}
          path: build
      - name: Package
        env:
          VERSION: ${{ inputs.version }}
          LABEL: ${{ matrix.label }}
        run: |
          mkdir build/Komorebi
          tar -xf "build/komorebi.${{ matrix.runtime }}.tar" -C build/Komorebi
          ./build/scripts/package.osx-app.sh
      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: package.${{ matrix.label }}
          path: build/komorebi_*.zip
          retention-days: 3
  linux:
    name: Package Linux
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - runtime: linux-x64
            label: linux-x64
          - runtime: linux-arm64
            label: linux-arm64
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Install packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot desktop-file-utils rpm libfuse2
      - name: Download build
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: komorebi.${{ matrix.runtime }}
          path: build
      - name: Package
        env:
          VERSION: ${{ inputs.version }}
          LABEL: ${{ matrix.label }}
          RUNTIME: ${{ matrix.runtime }}
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          mkdir build/Komorebi
          tar -xf "build/komorebi.${{ matrix.runtime }}.tar" -C build/Komorebi
          ./build/scripts/package.linux.sh
      - name: Upload package artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: package.${{ matrix.label }}
          path: |
            build/komorebi-*.AppImage
            build/komorebi_*.deb
            build/komorebi-*.rpm
          retention-days: 3
